<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/icone.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/style.css">
    <title>Sensor</title>
</head>

<body class="cores-background " data-background="azure-escuro-fundo" class=" cores-background "
    data-background="azure-escuro-fundo">
     <header>               
                    <div class="cores-background d-flex header px-3" data-background="azure-claro-fundo">
                        <img src="../assets/logo-track-flow.png" alt="Logo TrackFlow" class="hub-header-icon">
                        <div class=" hub-header-title-aligment">
                            <h2 class="fw-bold cores-color" data-color="white" > TrackFlow </h2>
                        </div>
                        <div class="w-50 h-75 d-flex d-flex flex-row-reverse ">
                            <div class=" shadow rounded-4 btn buttom cores-background me-5" data-background="cinza-claro-botoes"
                                       id="hub-toggle-admin"> <img class="icon" src="../assets/user.png" alt="User Icon">
                                       <h2 class="text-center hub-buttom hub-main-content-aligment fs-6 ms-2"> Administradores </h2>
                                   </div>
                                   <div class=" shadow rounded-4 btn buttom cores-background me-5" data-background="azul-real" id="hub-toggle-relatories">
                                       <img class="icon" src="../assets/relatorie.png" alt="UseIcon">
                                       <h2 class="hub-buttom fs-6 ms-2"> Relatórios </h2>
                                   </div>
                                   <div class=" shadow rounded-4 btn buttom cores-background me-5" data-background="verde" id="hub-toggle-sensor"> <img
                                           class="icon" src="../assets/sensor.png" alt="UseIcon">
                                       <h2 class=" hub-buttom fs-6 ms-2"> Sensores </h2>
                                   </div>
                        </div>
                        <img src="../assets/user.png" alt="menu TrackFlow" class="hub-header-user cores-background rounded-circle" data-background="cinza-claro">
                    </div>
            </header>

    <main>
        <div>
            <h1 class="titulo-Sensor">Sensor</h1>  
        </div>
        
        <div class="flex centralizar-botoes-sensor h-25 w-75">
           
            <div id="dados-buttom" class=" botoes-sensor btn  cores-background" data-background="cinza-claro-botoes" id="hub-toggle-sensor">
                <h2  class="dados-buttom cores-color" data-color="white"> Dados </h2>
            </div>
            <div id="gerenciar-buttom" class=" btn botoes-sensor cores-background" data-background="cinza-claro-botoes" id="hub-toggle-sensor">
                <h2  class="gerenciar-buttom cores-color" data-color="white"> Gerenciar </h2>
            </div>
        </div>

        <script src="../scripts/"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

        <button id="voltarhub" class="btn btn-danger back-buttom"> Voltar </button>
    </main>
    <footer>

    </footer>

     <script src="../scripts/script-sensor.js"></script>
     <script src="../scripts/script-admin.js"></script>
     <script src="../scripts/script-navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
