<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../Styles/style.css">
</head>

<body>
    <main>
        <div class="d-flex w-100 h-100">
            <div class="d-flex flex-column align-items-center justify-content-center c-TituloPagLogin">
                <div class="text-center">
                    <div class="d-flex justify-content-center mb-2">
                        <h1 class="TamanhoTituloSlogan">No <span class="LimeGreen">ritmo</span> que move
                            <br><u>estados</u>
                        </h1>
                    </div>
                    <img src="../Assets/logoTrackFlow.png" alt="Logo TrackFlow" class="ImgLoginPage">
                </div>
            </div>
            <div class="d-flex c-Separacao"></div>
            <div class="d-flex flex-column align-items-center justify-content-center c-AreaLogin">
                <div class="align-items-start">

                    <h2 class="text-light fs-1 mb-5">Entrar no TrackFlow</h2>
                    <form id="form-login">
                        <div class="form-floating">
                            <input type="text" class="form-control shadow p-3 mb-5 rounded border border-dark border-3" id="UsuarioNome"
                                placeholder="admin">
                            <label for="UsuarioNome">Nome</label>
                        </div>
                        <div class="form-floating">
                            <input type="password" class="form-control shadow p-3 mb-5 rounded border border-dark border-3" id="Senha"
                                placeholder="Password">
                            <label for="Senha">Senha</label>
                            <button id="botao-envio" type="submit" class="btn btn-dark vstack mx-auto">Entrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
