<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/logoTrackFlow.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../Styles/style.css">
    <title>Tela de login</title>
</head>

<body>
    <main>
        <!-- Parte com Slogan e Imagem -->
        <div class="d-flex w-100 h-100">
            <div class="d-flex flex-column align-items-center justify-content-center c-LoginSloganPag">
                <div class="text-center">
                    <div class="d-flex justify-content-center mb-2">
                        <h1 class="LoginTamanhoTituloSlogan">No <span class="LimeGreen">ritmo</span> que move
                            <br><u>estados</u>
                        </h1>
                    </div>
                    <img src="../Assets/logoTrackFlow.png" alt="Logo TrackFlow" class="LoginImg">
                </div>
            </div>
            <div class="d-flex c-LoginSeparacao"></div>
            <!-- Area Login -->
            <div class="d-flex flex-column align-items-center c-LoginArea">
                <div class="col-md-11">

                    <h1 class="text-light mb-5 text-start LoginTamanhoTituloLogin fw-bold">Entrar no TrackFlow</h1>
                    <form id="form-login">
                        <div class="form-floating me-5">
                            <input type="email"
                                class="form-control shadow p-4 mb-5 rounded border border-dark border-5 bg-transparent"
                                id="UsuarioEmail" placeholder="admin">
                            <label for="UsuarioEmail" class="fs-6">Email</label>
                        </div>
                        <div class="form-floating me-5">
                            <input type="password"
                                class="form-control shadow p-4 mb-5 rounded border border-dark border-5 bg-transparent"
                                id="UsuarioSenha" placeholder="Password">
                            <label for="UsuarioSenha" class="fs-6">Senha</label>
                            <button id="botao-envio" type="submit"
                                class="AzulReal w-100 rounded-pill fs-4 text-light fw-bold LoginButton">Entrar</button>
                            <p class="toggle fs-4 d-flex flex-column align-items-center fw-bold text-light mt-2">
                                <u>Esqueceu a senha?</u></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="../Scripts/ScriptLogin.js"> </script>
</body>

</html>
