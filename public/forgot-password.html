<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/logo/icone.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/style.css">
    <title>Esqueceu sua senha</title>
</head>

<body class="cores-background" data-background="azure-escuro-fundo">
    <header>
        <div class="d-flex flex-column align-items-center justify-content-center mt-4">
            <img class="forgot-pass-logo" src="../assets/logo/logo-track-flow.png" alt="">
            <h2 class="cores-color" data-color="white">Trackflow</h2>
        </div>
    </header>
    <main>
        <div>
            <form action="" class="text-center mt-3 cores-color" data-color="white">
                <div class="d-flex flex-column align-items-center justify-content-center">
                    <label class="userselect fs-5" for="usuario-email">Insira seu email</label>
                    <input type="email"
                        class="form-control mt-2 p-3 rounded border border-dark border-4 bg-transparent text-light forgot-pass-main-input"
                        id="email-forgot" placeholder="">
                    <button type="submit" class="cores-color mt-3 border-0 cores-background rounded-pill px-3 py-1" data-background="azul-real" data-color="white">
                        Enviar email
                    </button>
                </div>
            </form>
        </div>
    </main>
    <footer></footer>
</body>

</html>
