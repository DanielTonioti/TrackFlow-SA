<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/icone.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/style.css">
    <title> Página Inicial </title>
</head>

<body class="cores-background " data-background="azure-escuro-fundo" class=" cores-background " data-background="azure-escuro-fundo">

    <head>
        <header>
            <div class="cores-background d-flex header p-2" data-background="azure-claro-fundo">
                <img src="../assets/logo-track-flow.png" alt="Logo TrackFlow" class="hub-header-icon">
                <div class="d-flex align-items-center justify-content-center">
                    <h3 class="login-tamanho-titulo-slogan cores-color" data-color="white" > TrackFlow </h3>
                </div>
                <img src="../assets/user.png" alt="menu TrackFlow" class="hub-header-user cores-background rounded-circle" data-background="cinza-claro">
            </div>
        </header>
    </head>
    <main>
        <div class="centralizer">
            <div>
                <div class="d-flex flex-column align-items-center justify-content-center">
                    <div>
                        <div class="d-flex flex-column align-items-center justify-content-center mb-4">
                            <h1 class="cores-color hub-greetings-user" data-color="black"> Olá, (PlaceHolder) </h1>
                        </div>
                        <!-- Central Botões -->
                        <div class="d-flex flex-column align-items-center justify-content-center">
                            <div class="btn buttom cores-background" data-background="cinza-claro-botoes"
                                id="hub-toggle-admin"> <img class="icon" src="../assets/user.png" alt="User Icon">
                                <h2 class="hub-buttom"> Administradores </h2>
                            </div>
                            <div class="btn buttom cores-background" data-background="azul-real" id="hub-toggle-relatories">
                                <img class="icon" src="../assets/relatorie.png" alt="UseIcon">
                                <h2 class="hub-buttom"> Relatórios </h2>
                            </div>
                            <div class="btn buttom cores-background" data-background="verde" id="hub-toggle-sensor"> <img
                                    class="icon" src="../assets/sensor.png" alt="UseIcon">
                                <h2 class="hub-buttom"> Sensores </h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>

    </footer>

    <script src="../scripts/script-hub.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
