<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/icone.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/style.css">
    <title> Página Inicial </title>
</head>

<body class="cores-background " data-background="azure-escuro-fundo">

    <head>
      <header>
   <!-- NAV: Menu responsivo do Bootstrap -->
   <nav class="navbar navbar-expand-lg cores-background" data-background="azure-claro-fundo">
      
       <!-- Container interno (Bootstrap) -->
       <div class="container-fluid">
          
           <!-- SEÇÃO 1: LOGO + TÍTULO -->
           <a class="navbar-brand d-flex align-items-center" href="#">
               <!-- Logo da empresa -->
               <img src="../assets/logo-track-flow.png" alt="Logo TrackFlow"
                class="hub-icon ">
              
               <!-- Texto "TrackFlow" → -->
               <h2 class="fw-bold cores-color mb-0" data-color="white">
                   TrackFlow
               </h2>
           </a>
           
           <!-- SEÇÃO 2: HAMBURGER BUTTON (só aparece em mobile) -->
           <button
               class="navbar-toggler"
               type="button"
               data-bs-toggle="collapse"
               data-bs-target="#navbarNav"> 
               <span class="navbar-toggler-icon"></span>
           </button>
 
           <!-- SEÇÃO 3: MENU ITEMS (aparece em mobile se clicar, sempre em desktop) -->
           <div class="collapse navbar-collapse" id="navbarNav">
               <!-- Container dos botões com espaçamento -->
               <div class="ms-auto d-flex gap-2 flex-wrap justify-content-center justify-content-lg-end align-items-center">
                  
                   <!-- BOTÃO 1: ADMINISTRADORES -->
                   <button
                       class="btn-sm btn-lg-md rounded-4 d-flex align-items-center cores-background"
                       data-background="cinza-claro-botoes" id="hub-toggle-admin">
                       <!-- Ícone do botão -->
                       <img class="icon-sm" src="../assets/user.png" alt="User Icon">
                       <!-- Texto (só aparece em smartphone grande+) -->
                       <span class="ms-2 d-none d-sm-inline fw-bold cores-color" data-color="white">
                           Administradores
                       </span>
                   </button>
 
                   <!-- BOTÃO 2: RELATÓRIOS -->
                   <button
                       class="btn btn-sm btn-lg-md cores-background rounded-4 d-flex align-items-center"
                       data-background="azul-real"
                       id="hub-toggle-relatories">
                       <img class="icon-sm" src="../assets/relatorie.png" alt="Relatórios Icon">
                       <span class="ms-2 d-none d-sm-inline fw-bold cores-color" data-color="white">
                           Relatórios
                       </span>
                   </button>
 
                   <!-- BOTÃO 3: SENSORES -->
                   <button
                       class="btn btn-sm btn-lg-md cores-background rounded-4 d-flex align-items-center"
                       data-background="verde"
                       id="hub-toggle-sensor">
                       <img class=" icon-sm" src="../assets/sensor.png" alt="Sensor Icon">
                       <span class="ms-2 d-none d-sm-inline fw-bold cores-color" data-color="white">
                           Sensores
                       </span>
                   </button>
 
                   <!-- FOTO DO USUÁRIO (direita) -->
                
               </div>
           </div>
              <img
                       src="../assets/user.png"
                       alt="User Profile"
                       class=" hub-user cores-background rounded-circle"
                       data-background="cinza-claro">
       </div>
   </nav>
</header>

    </head>
    <main>
        <div class="d-flex flex-column align-items-center justify-content-center">
            <div class="d-flex flex-column align-items-center">
                <div class="d-flex flex-column align-items-center justify-content-center mb-4">
                    <h1 class="cores-color hub-greetings-user fs-2" data-color="black"> Olá, (PlaceHolder) </h1>
                </div>
                <p class="fs-3 fw-bold">
                    Usuarios:
                </p>
                <div class="h-50 cores-background " data-background="azure-claro-fundo">
                    <div class="d-flex flex-column align-items-center justify-content-center">
                        <div class="flex">
                            <p class="admin-tabela-button border-tabela cores-color cores-background" data-color="white"
                                data-background="azure-claro-fundo">
                                S001
                            </p>
                            <button class="border-tabela admin-tabela  tabela-texto cores-color cores-background"
                                data-color="white" data-background="verde">
                                Funcionando
                            </button>
                        </div>
                        <div class="flex">
                            <p class="admin-tabela-button border-tabela cores-color cores-background" data-color="white"
                                data-background="azure-claro-fundo">
                                S002
                            </p>
                            <button class="border-tabela admin-tabela  tabela-texto cores-color cores-background"
                                data-color="white" data-background="vermelho">
                                Não funcionando
                            </button>
                        </div>
                        <div class="flex">
                            <p class="admin-tabela-button border-tabela cores-color cores-background" data-color="white"
                                data-background="azure-claro-fundo">
                                S003
                            </p>
                            <button class="border-tabela admin-tabela  tabela-texto cores-color cores-background"
                                data-color="white" data-background="verde">
                                Funcionando
                            </button>
                        </div>
                        <div class="flex">
                            <p class="admin-tabela-button border-tabela cores-color cores-background" data-color="white"
                                data-background="azure-claro-fundo">
                                S004
                            </p>
                            <button class="border-tabela admin-tabela  tabela-texto cores-color cores-background"
                                data-color="white" data-background="cinza-claro">
                                Em manutenção
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <button id="VoltarLogin" class="btn btn-danger back-buttom"> Sair </button>
        </main>
        <footer>
    
        </footer>
    
        <script src="../scripts/script-sair.js"></script>
        <script src="../scripts/script-navbar.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

</body>

</html>
